<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Stadium Buddy — GenAI Stadium & Operations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,100..900;1,100..900&family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;1,700&family=Archivo+Narrow:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .ai-glass {
      background: rgba(23, 31, 51, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(183, 196, 255, 0.1);
    }

    .pulse-red {
      animation: pulse-red-bg 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse-red-bg {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .7;
      }
    }

    .shimmer {
      background: linear-gradient(90deg, rgba(183, 196, 255, 0) 0%, rgba(183, 196, 255, 0.05) 50%, rgba(183, 196, 255, 0) 100%);
      background-size: 200% 100%;
      animation: shimmer-anim 2s infinite linear;
    }

    @keyframes shimmer-anim {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }
  </style>
</head>

<body class="bg-surface text-on-surface font-sans antialiased overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
