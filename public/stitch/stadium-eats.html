        function toggleBag() {

        // Simple scroll interaction for header
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('bg-background/95', 'backdrop-blur-sm');
            } else {
                header.classList.remove('bg-background/95', 'backdrop-blur-sm');
            }
        });

        // Add to cart micro-interaction
        document.querySelectorAll('button').forEach(btn => {
            if (btn.innerText.includes('add')) {
                btn.addEventListener('click', function(e) {
                    const ripple = document.createElement('div');
                    ripple.className = 'absolute inset-0 bg-white/20 rounded-full animate-ping';
                    this.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 500);
                });
            }
        });
